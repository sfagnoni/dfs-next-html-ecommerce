<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Carrito — DFS Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}</style>
  </head>
  <body class="bg-gray-50 text-gray-800">
    <header class="max-w-7xl mx-auto px-6 py-6 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3">
        <div class="bg-gradient-to-tr from-indigo-500 to-pink-500 text-white w-10 h-10 rounded-lg flex items-center justify-center font-bold">DF</div>
        <span class="text-xl font-semibold">DFS Shop</span>
      </a>
      <nav class="flex items-center gap-6">
        
        <a href="cart.html" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg shadow hover:shadow-lg">Carrito <span class="bg-white text-indigo-600 rounded-full px-2 py-0.5 text-xs font-semibold">3</span></a>
      </nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
      <h1 class="text-2xl font-bold mb-6">Tu carrito</h1>

      <div class="grid md:grid-cols-3 gap-8">
        <section class="md:col-span-2 space-y-4">
          <!-- Item -->
          <div class="bg-white p-4 rounded-lg shadow flex items-center gap-4">
            <img src="https://picsum.photos/seed/cart-item-1/400/240" class="w-28 h-20 object-cover rounded-md" />
            <div class="flex-1">
              <div class="flex items-center justify-between">
                <div>
                  <div class="font-semibold">Auriculares inalámbricos</div>
                  <div class="text-sm text-gray-500">Serie X</div>
                </div>
                <div class="font-semibold">$129</div>
              </div>
              <div class="mt-3 flex items-center gap-3">
                <input type="number" value="1" min="1" class="w-24 border rounded-lg px-3 py-1" />
                <button class="text-sm text-red-500">Eliminar</button>
              </div>
            </div>
          </div>

          <div class="bg-white p-4 rounded-lg shadow flex items-center gap-4">
            <img src="https://picsum.photos/seed/cart-item-2/400/240" class="w-28 h-20 object-cover rounded-md" />
            <div class="flex-1">
              <div class="flex items-center justify-between">
                <div>
                  <div class="font-semibold">Reloj minimalista</div>
                  <div class="text-sm text-gray-500">Correa de cuero</div>
                </div>
                <div class="font-semibold">$199</div>
              </div>
              <div class="mt-3 flex items-center gap-3">
                <input type="number" value="1" min="1" class="w-24 border rounded-lg px-3 py-1" />
                <button class="text-sm text-red-500">Eliminar</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="bg-white p-6 rounded-lg shadow">
          <h2 class="text-lg font-semibold">Resumen</h2>
          <div class="mt-4 space-y-2 text-sm text-gray-600">
            <div class="flex justify-between"><span>Subtotal</span><span>$328</span></div>
            <div class="flex justify-between"><span>Envío</span><span>$0</span></div>
            <div class="flex justify-between"><span>Descuento</span><span class="text-green-600">-$20</span></div>
          </div>
          <div class="mt-4 border-t pt-4 flex items-center justify-between font-bold">
            <span>Total</span>
            <span>$308</span>
          </div>
          <button class="mt-6 w-full bg-indigo-600 text-white py-3 rounded-lg">Proceder al pago</button>
        </aside>
      </div>
    </main>

    <footer class="border-t py-8">
      <div class="max-w-6xl mx-auto px-6 text-sm text-gray-600">© 2025 DFS Shop</div>
    </footer>
  </body>
</html>
